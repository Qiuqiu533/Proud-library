name: DB日次バックアップ（Neon → GitHub Artifacts）

on:
  schedule:
    - cron: "0 20 * * *"  # 毎日 JST 05:00（UTC 20:00）
  workflow_dispatch:       # 手動実行も可能

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: PostgreSQLクライアントをインストール（PGDG公式リポジトリから最新版）
        # 2026-07: Ubuntuランナー標準のpostgresql-client（v16系）がNeon側の
        # PostgreSQLバージョンより古く、pg_dumpが失敗する事象が発生
        # （7/5・7/4・6/28）。一度postgresql-client-17へ修正したが、
        # 実際のNeonサーバーはPostgreSQL 18で、依然client(16.14) < server(18.4)
        # のまま失敗した（2026-07-07判明）。postgresql-client-18を明示指定する。
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18

      - name: pg_dumpでバックアップ取得
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          export PATH="/usr/lib/postgresql/18/bin:$PATH"
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          FILENAME="proud_library_backup_${TIMESTAMP}.sql"
          echo "--- 使用中のpg_dumpの確認 ---"
          which pg_dump
          pg_dump --version
          which psql || true
          psql --version || true
          echo "-----------------------------"
          pg_dump "$DATABASE_URL" \
            --no-password \
            --clean \
            --if-exists \
            --no-owner \
            --no-acl \
            --format=plain \
            > "$FILENAME"
          echo "FILENAME=$FILENAME" >> $GITHUB_ENV
          echo "バックアップ完了: $FILENAME ($(wc -l < $FILENAME) 行)"

      - name: Artifactsにアップロード（30日間保持）
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ github.run_number }}
          path: ${{ env.FILENAME }}
          retention-days: 30
