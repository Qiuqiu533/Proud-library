name: Render スリープ防止 keep-alive

on:
  schedule:
    - cron: "*/10 0-13 * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: ヘルスチェック ping
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 55 \
            "${{ secrets.APP_BASE_URL }}/api/library-info")
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Warning: got $STATUS (server may be waking up)"
          fi
